name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -v

      - name: Check zero external dependencies
        run: |
          python -c "
          import ast, os, sys
          external = []
          stdlib = set(sys.stdlib_module_names)
          for root, dirs, files in os.walk('hipaasynth'):
              dirs[:] = [d for d in dirs if d not in ['__pycache__']]
              for f in files:
                  if not f.endswith('.py'): continue
                  path = os.path.join(root, f)
                  try:
                      with open(path, encoding='utf-8') as f:
                          src = f.read()
                      tree = ast.parse(src)
                  except Exception:
                      continue
                  for node in ast.walk(tree):
                      if isinstance(node, ast.ImportFrom):
                          if node.level and node.level > 0:
                              continue
                          if node.module:
                              m = node.module.split('.')[0]
                              if m and m not in stdlib and not m.startswith('hipaasynth') and m not in ('__future__', 'fhir'):
                                  external.append((path, m))
                      elif isinstance(node, ast.Import):
                          for a in node.names:
                              m = a.name.split('.')[0]
                              if m and m not in stdlib and not m.startswith('hipaasynth') and m not in ('__future__', 'fhir'):
                                  external.append((path, m))
          if external:
              print('EXTERNAL DEPS FOUND:')
              for path, mod in external: print(f'  {path}: {mod}')
              exit(1)
          print('Zero external dependencies: PASS')
          "
